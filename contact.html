<!doctype html>
<html lang="en" class="terminal">

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<title>Contact - Bash Terminal Theme</title>
	<meta name="description" content="Get in touch" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="theme-color" content="#00ffff" />
	<link rel="icon" href="src/icons/favicon.png" />
	<link rel="stylesheet" href="css/style.css" />
</head>
<header>
	<nav class="nav-bar">
		<img class="nav-logo" src="src/icons/favicon.png" alt="EMIX DEV Logo" />
		<div class="logo">EMIX DEV</div>
		<button class="hamburger" id="hamburger" aria-label="Toggle menu">
			&#9776;
		</button>
		<ul class="nav-links">
			<li><a href="/index.html">Home</a></li>
			<li><a href="/about.html">About</a></li>
			<li class="active">
				<a href="/contact.html">Contact</a>
			</li>
		</ul>
	</nav>
</header>

<body class="terminal">
	<div class="container">
		<main class="main-content-contact">
			<section class="section-cdd">
				<form id="contact-form" name="contact" method="POST" action="/thank-you.html"
					data-netlify="true" netlify netlify-honeypot="bot-field" class="contact-form">
					<p>
						Upload your request
						through the secure grid.
					</p>
					<input type="hidden" name="form-name" value="contact" />
					<p class="hidden">
						<label>Don't fill this
							out if you're
							human:
							<input name="bot-field" /></label>
					</p>
					<input type="text" placeholder="Name" name="name" id="name" required />
					<input type="email" placeholder="Email" name="email" id="email" required />
					<textarea name="message" id="message" rows="5" placeholder="Message"
						required></textarea>
					<button type="submit">
						Submit
					</button>
				</form>
				<div id="form-response" aria-live="polite" style="
							margin-top: 1rem;
							color: var(
								--secondary-color
							);
						"></div>
			</section>
		</main>
		<script src="js/main.js"></script>
	</div>
</body>

</footer>
