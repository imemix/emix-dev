 <body class="terminal">
   <div class="container">


   <main class="main-content-contact">
     <section class="section-cdd">
         <p>Upload your request through the secure grid.</p>

       <!-- Netlify form: name must match form-name hidden field -->
       <form id="contact-form" name="contact" method="POST" action="/thank-you.html" data-netlify="true" netlify netlify-honeypot="bot-field" class="contact-form">
         <!-- required hidden input for Netlify to identify the form -->
         <input type="hidden" name="form-name" value="contact">
         <!-- honeypot field to trap bots -->
         <p class="hidden">
           <label>Don't fill this out if you're human: <input name="bot-field"></label>
         </p>
         <input type="text" placeholder="Name" name="name" id="name" required>
         <input type="email" placeholder="Email" name="email" id="email" required>
         <textarea name="message" id="message" rows="5" placeholder="Message" required></textarea>
         <button type="submit">Submit</button>
       </form>
       <!-- placeholder for response message -->
       <div id="form-response" aria-live="polite" style="margin-top:1rem;color:var(--secondary-color);"></div>
       
     </section>
     
   </main>
  <script src="js/main.js"></script>
  
  </div>
